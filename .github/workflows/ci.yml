name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      USE_MOCK_LLM: "1"              # all steps run offline — no API key needed
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0               # TruffleHog needs full history

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools
        run: pip install ruff black -r requirements.txt -r requirements-test.txt

      - name: Lint (Ruff)
        run: ruff check .

      - name: Format check (Black)
        run: black --check .

      - name: Tests (deterministic, mock mode)
        run: pytest -q

      - name: Secret scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - uses: docker/setup-buildx-action@v3

      - name: Build image (layer caching)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
