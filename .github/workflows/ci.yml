name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      USE_MOCK_LLM: "1"              # all steps run offline — no API key needed
      AI_SERVICE_TOKEN: "ci-test-token-not-a-real-secret"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0               # TruffleHog needs full history

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Format check (Black)
        run: uv run black --check .

      - name: Type check (mypy)
        run: uv run mypy app

      - name: Unit tests (deterministic, mock mode)
        run: uv run pytest tests -q --ignore=tests/integration

      - name: Integration tests (Testcontainers Postgres + Alembic)
        run: uv run pytest tests/integration -q

      - name: Secret scan (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Dependency vulnerability scan (pip-audit)
        run: uvx pip-audit

      - uses: docker/setup-buildx-action@v3

      - name: Build image (layer caching)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
