# Pinned explicitly so the Compose project/container names stay
# "nbe-ai-service-*" rather than defaulting to "compose-*" (the basename of
# the directory this file lives in).
name: nbe-ai-service

# Vendored, self-contained observability sub-stack (Langfuse v3 + its own
# Postgres/ClickHouse/Redis/MinIO) — pulled in as a unit so a `docker compose
# up --profile observability` starts it alongside ai-service/mineru-server
# with no separate command. Opt-in: all six of its services carry `profiles:
# ["observability"]` (see langfuse/docker-compose.yml), so a plain `docker
# compose up` (no `--profile` flag) skips them entirely
# (spec SC-003, contracts/observability-config.md §2, research.md §9).
include:
  - langfuse/docker-compose.yml

services:
  ai-service:
    build: ..
    # The service's entire runtime configuration is sourced from `.env`
    # via `env_file` below — no parallel `environment:` block (FR-001:
    # one source of truth per setting). `docker-compose.prod.yml` is the
    # only override that legitimately pins `environment:` entries, and
    # that works regardless of this block being absent: compose merges
    # `environment:` across all `-f` files before applying precedence,
    # so an override file's `environment:` outranks this base file's
    # `env_file:` either way.
    env_file:
      - ../.env       # holds AI_SERVICE_CHAT_MODEL__OPENAI_API_KEY etc. — gitignored

  mineru-server:
    extends:
      file: mineru/docker-compose.yml
      service: mineru-api
