# Real production overlay. Boots the hardened `prod` image and joins
# `nbe-prod` — the network nbe-financial-advisor-backend/deploy/docker-compose.yml
# creates — so this container is reachable at `http://ai-service:8001` from
# `backend`/`celery-worker` there (deploy/docker-compose.yml no longer
# builds/runs ai-service itself; this file is that side of the real
# deployment path).
#
# All runtime config (DB/S3/LLM/MinerU credentials, token, etc.) comes from
# `../.env` via the base file's `env_file:` — same single source of truth as
# dev. Put real production values there before running this; nothing here
# pins mock/dummy overrides.
#
# REQUIRES the `nbe-prod` network to already exist (created by bringing up
# nbe-financial-advisor-backend/deploy/docker-compose.yml, or manually via
# `docker network create nbe-prod`) — `docker compose up` fails immediately
# otherwise ("network nbe-prod declared as external, but could not be
# found").
#
# Usage: make prod-up  (or: docker compose -f compose/docker-compose.yml -f compose/docker-compose.prod.yml up --build -d)
services:
  ai-service:
    build:
      target: prod
    restart: unless-stopped

networks:
  default:
    name: ${PROD_NETWORK_NAME:-nbe-prod}
    external: true
